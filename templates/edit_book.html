<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        form { display: flex; flex-direction: column; width: 300px; }
        label { margin-top: 1em; }
        input { padding: 0.5em; margin-top: 0.5em; }
        button { margin-top: 1.5em; padding: 0.7em; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .nav { margin-bottom: 2em; }
        .nav a { margin-right: 1em; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('view_books') }}">Back to View Books</a>
    </div>
    <h1>Edit Book (ID: {{ book.Book_ID }})</h1>
    <form action="{{ url_for('edit_book', book_id=book.Book_ID) }}" method="post">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ book.Title }}" required>

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" value="{{ book.Author }}" required>

        <label for="publisher">Publisher:</label>
        <input type="text" id="publisher" name="publisher" value="{{ book.Publisher }}" required>

        <button type="submit">Update Book</button>
    </form>
</body>
</html>
