<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return a Book</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        form { display: flex; flex-direction: column; width: 300px; }
        label { margin-top: 1em; }
        select { padding: 0.5em; margin-top: 0.5em; }
        button { margin-top: 1.5em; padding: 0.7em; background-color: #ffc107; color: black; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #e0a800; }
        .nav { margin-bottom: 2em; }
        .nav a { margin-right: 1em; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('index') }}">Home</a>
    </div>
    <h1>Return a Book</h1>
    <form action="{{ url_for('return_book') }}" method="post">
        <label for="book_id">Select Book to Return:</label>
        <select id="book_id" name="book_id" required>
            {% for book in books %}
                <option value="{{ book.Book_ID }}">{{ book.Title }} (ID: {{ book.Book_ID }})</option>
            {% endfor %}
        </select>
        <button type="submit">Return Book</button>
    </form>
</body>
</html>
