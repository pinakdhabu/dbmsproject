<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Student</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        form { display: flex; flex-direction: column; width: 300px; }
        label { margin-top: 1em; }
        input { padding: 0.5em; margin-top: 0.5em; }
        button { margin-top: 1.5em; padding: 0.7em; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .nav { margin-bottom: 2em; }
        .nav a { margin-right: 1em; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('index') }}">Home</a>
    </div>
    <h1>Add a New Student</h1>
    <form action="{{ url_for('add_student') }}" method="post">
        <label for="stud_id">Student ID:</label>
        <input type="text" id="stud_id" name="stud_id" required>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="dept">Department:</label>
        <input type="text" id="dept" name="dept" required>

        <label for="year">Year:</label>
        <input type="text" id="year" name="year" required>

        <button type="submit">Add Student</button>
    </form>
</body>
</html>
